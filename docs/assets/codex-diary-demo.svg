<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Codex Diary app demo</title>
  <desc id="desc">A warm macOS-style preview of Codex Diary showing a diary, report, timeline, and calendar sidebar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f2"/>
      <stop offset="0.45" stop-color="#fffdfb"/>
      <stop offset="1" stop-color="#ffe1d8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9f86"/>
      <stop offset="1" stop-color="#f36f5d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff5ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#ba6c5e" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#d98170" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 800 56px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #382c29; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8f7b74; }
      .label { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4a3934; }
      .small { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9b847c; }
      .tiny { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f47764; }
      .body { font: 500 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4d3d39; }
      .body-muted { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8d7972; }
      .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #76615a; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1390" cy="95" r="180" fill="#ffd9c9" opacity="0.42"/>
  <circle cx="255" cy="810" r="230" fill="#ffe9dc" opacity="0.65"/>
  <path d="M120 775 C355 655 484 798 710 700 C920 608 1095 687 1475 565" fill="none" stroke="#ffd5c7" stroke-width="28" stroke-linecap="round" opacity="0.32"/>

  <rect x="88" y="76" width="1424" height="744" rx="56" fill="#fffaf7" filter="url(#shadow)"/>
  <rect x="88" y="76" width="1424" height="744" rx="56" fill="none" stroke="#f7cfc3" stroke-width="2"/>

  <rect x="88" y="76" width="230" height="744" rx="56" fill="#ffe9df"/>
  <path d="M318 76 V820" stroke="#f2cabf" stroke-width="2"/>
  <circle cx="132" cy="114" r="11" fill="#ff6159"/>
  <circle cx="163" cy="114" r="11" fill="#ffbd2e"/>
  <circle cx="194" cy="114" r="11" fill="#28c840"/>

  <circle cx="166" cy="204" r="36" fill="#ffffff" filter="url(#soft)"/>
  <path d="M145 205 C142 181 174 174 184 193 C205 195 208 225 185 230 H155 C143 230 134 216 145 205Z" fill="#fff8e9" stroke="#6a3b25" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="160" cy="205" r="4" fill="#4b2d24"/>
  <circle cx="178" cy="205" r="4" fill="#4b2d24"/>
  <path d="M162 217 Q169 223 177 217" fill="none" stroke="#4b2d24" stroke-width="3" stroke-linecap="round"/>

  <rect x="122" y="286" width="160" height="64" rx="22" fill="#ffffff"/>
  <rect x="122" y="374" width="160" height="64" rx="22" fill="#fff3ed"/>
  <rect x="122" y="462" width="160" height="64" rx="22" fill="#fff3ed"/>
  <rect x="122" y="650" width="160" height="94" rx="24" fill="#ffffff"/>
  <text x="160" y="326" class="label">Diary</text>
  <text x="152" y="414" class="body-muted">Calendar</text>
  <text x="154" y="502" class="body-muted">Archive</text>
  <text x="151" y="696" class="body-muted">Settings</text>

  <rect x="386" y="120" width="1068" height="640" rx="38" fill="url(#panel)" stroke="#f6d0c5" stroke-width="2"/>

  <text x="440" y="206" class="title">Codex Diary</text>
  <text x="442" y="246" class="subtitle">Turn Chronicle summaries into a work report and a cozy daily diary.</text>

  <rect x="1040" y="150" width="158" height="48" rx="24" fill="#f0fff1" stroke="#b9dfbc" stroke-width="2"/>
  <circle cx="1074" cy="174" r="10" fill="#87bf8f"/>
  <text x="1094" y="181" class="label">gpt-5.4</text>

  <rect x="1218" y="150" width="184" height="54" rx="27" fill="url(#accent)" filter="url(#soft)"/>
  <text x="1254" y="184" style="font: 800 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#fff;">Create diary</text>

  <rect x="440" y="292" width="440" height="88" rx="28" fill="#fff0e9"/>
  <text x="478" y="328" class="tiny">TODAY</text>
  <text x="478" y="358" class="body">2026. 04. 24. Friday</text>
  <rect x="910" y="292" width="292" height="58" rx="29" fill="#f8e4dc"/>
  <rect x="920" y="301" width="88" height="40" rx="20" fill="#ffffff"/>
  <text x="944" y="327" class="label">Diary</text>
  <text x="1038" y="327" class="body-muted">Report</text>
  <text x="1126" y="327" class="body-muted">Markdown</text>

  <rect x="440" y="414" width="650" height="230" rx="30" fill="#ffffff" stroke="#f4cfc3" stroke-width="2"/>
  <text x="484" y="468" style="font: 800 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#3d302d;">Today's Diary</text>
  <rect x="484" y="500" width="552" height="76" rx="24" fill="#fff1e4"/>
  <text x="518" y="548" class="body-muted">Collected 10-minute Chronicle notes and shaped them into a calm record.</text>
  <text x="484" y="612" class="body">Reviewed app polish, model selection, Homebrew distribution, and release notes.</text>

  <rect x="1130" y="414" width="248" height="230" rx="30" fill="#fff8f2" stroke="#f4cfc3" stroke-width="2"/>
  <text x="1170" y="462" class="label">Timeline</text>
  <line x1="1186" y1="492" x2="1186" y2="594" stroke="#f4cfc3" stroke-width="4" stroke-linecap="round"/>
  <circle cx="1186" cy="512" r="10" fill="#fff" stroke="#f47d68" stroke-width="5"/>
  <circle cx="1186" cy="556" r="10" fill="#fff" stroke="#f47d68" stroke-width="5"/>
  <circle cx="1186" cy="600" r="10" fill="#fff" stroke="#f47d68" stroke-width="5"/>
  <text x="1214" y="518" class="small">Read notes</text>
  <text x="1214" y="562" class="small">Draft report</text>
  <text x="1214" y="606" class="small">Save diary</text>

  <rect x="440" y="676" width="938" height="46" rx="23" fill="#fff0e7"/>
  <circle cx="474" cy="699" r="11" fill="#ffe48b"/>
  <text x="502" y="706" class="mono">Chronicle summaries only · local day boundary · no raw recordings</text>
</svg>
